<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MovieFlix - Watch Free Movies Online</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <!-- Navbar -->
    <div class="navbar">
        <div class="nav-container">
            <h1 class="logo" onclick="location.reload()">MovieFlix</h1>
            <nav>
                <a href="#" class="nav-link active" data-page="home">Home</a>
                <a href="#" class="nav-link" data-page="movies">Movies</a>
                <a href="#" class="nav-link" data-page="tvshows">TV Shows</a>
                <a href="#" class="nav-link" data-page="new-popular">New & Popular</a>
                <a href="#" class="nav-link" data-page="my-list">My List</a>
            </nav>
            <div class="nav-right">
                <div class="search-container">
                    <i class="fas fa-search search-icon"></i>
                    <input type="text" class="search-input" placeholder="Search movies...">
                </div>
                <i class="fas fa-bell"></i>
                <i class="fas fa-user-circle"></i>
            </div>
        </div>
    </div>

    <!-- Genre Filter Bar -->
    <div class="genre-bar">
        <button class="genre-btn active" data-genre="all">All</button>
        <button class="genre-btn" data-genre="28">Action</button>
        <button class="genre-btn" data-genre="12">Adventure</button>
        <button class="genre-btn" data-genre="16">Animation</button>
        <button class="genre-btn" data-genre="35">Comedy</button>
        <button class="genre-btn" data-genre="80">Crime</button>
        <button class="genre-btn" data-genre="18">Drama</button>
        <button class="genre-btn" data-genre="14">Fantasy</button>
        <button class="genre-btn" data-genre="27">Horror</button>
        <button class="genre-btn" data-genre="10749">Romance</button>
        <button class="genre-btn" data-genre="878">Sci-Fi</button>
        <button class="genre-btn" data-genre="53">Thriller</button>
    </div>

    <!-- Hero Section -->
    <div class="hero" id="hero-section">
        <div class="hero-content">
            <h1 class="hero-title" id="hero-title">Loading...</h1>
            <p class="hero-description" id="hero-description"></p>
            <div class="hero-buttons">
                <button class="btn play-btn" id="hero-play-btn"><i class="fas fa-play"></i> Play</button>
                <button class="btn info-btn" id="hero-info-btn"><i class="fas fa-info-circle"></i> More Info</button>
            </div>
        </div>
    </div>

    <!-- Main Content Area -->
    <div class="main-content" id="main-content">
        <!-- Movie Rows (Home Page) -->
        <div class="movie-rows" id="movie-rows">
            <div class="movie-row">
                <h2 class="row-title">Trending Now</h2>
                <div class="movie-slider">
                    <button class="slider-btn prev"><i class="fas fa-chevron-left"></i></button>
                    <div class="movies-grid" id="trending"></div>
                    <button class="slider-btn next"><i class="fas fa-chevron-right"></i></button>
                </div>
            </div>

            <div class="movie-row">
                <h2 class="row-title">Popular on MovieFlix</h2>
                <div class="movie-slider">
                    <button class="slider-btn prev"><i class="fas fa-chevron-left"></i></button>
                    <div class="movies-grid" id="popular"></div>
                    <button class="slider-btn next"><i class="fas fa-chevron-right"></i></button>
                </div>
            </div>

            <div class="movie-row">
                <h2 class="row-title">Top Rated Movies</h2>
                <div class="movie-slider">
                    <button class="slider-btn prev"><i class="fas fa-chevron-left"></i></button>
                    <div class="movies-grid" id="top-rated"></div>
                    <button class="slider-btn next"><i class="fas fa-chevron-right"></i></button>
                </div>
            </div>

            <div class="movie-row">
                <h2 class="row-title">Upcoming Releases</h2>
                <div class="movie-slider">
                    <button class="slider-btn prev"><i class="fas fa-chevron-left"></i></button>
                    <div class="movies-grid" id="upcoming"></div>
                    <button class="slider-btn next"><i class="fas fa-chevron-right"></i></button>
                </div>
            </div>
        </div>

        <!-- Movies Page -->
        <div class="category-page" id="movies-page" style="display: none;">
            <h1 class="page-title">Movies</h1>
            <div class="movies-grid page-grid" id="movies-grid"></div>
            <div class="pagination" id="movies-pagination"></div>
        </div>

        <!-- TV Shows Page -->
        <div class="category-page" id="tvshows-page" style="display: none;">
            <h1 class="page-title">TV Shows</h1>
            <div class="movies-grid page-grid" id="tvshows-grid"></div>
            <div class="pagination" id="tvshows-pagination"></div>
        </div>

        <!-- New & Popular Page -->
        <div class="category-page" id="new-popular-page" style="display: none;">
            <h1 class="page-title">New & Popular</h1>
            <div class="movies-grid page-grid" id="new-popular-grid"></div>
            <div class="pagination" id="new-popular-pagination"></div>
        </div>

        <!-- My List Page -->
        <div class="category-page" id="my-list-page" style="display: none;">
            <h1 class="page-title">My List</h1>
            <div class="movies-grid page-grid" id="my-list-grid"></div>
            <button class="btn clear-list-btn" id="clear-list-btn" style="margin: 20px auto; display: block;">Clear My List</button>
        </div>

        <!-- Search Results Page -->
        <div class="category-page" id="search-page" style="display: none;">
            <h1 class="page-title">Search Results</h1>
            <div class="movies-grid page-grid" id="search-grid"></div>
        </div>
    </div>

    <!-- Movie Info Modal -->
    <div class="modal" id="movie-modal">
        <div class="modal-content">
            <span class="close-modal">&times;</span>
            <div class="modal-body">
                <img src="" alt="" class="modal-backdrop" id="modal-backdrop">
                <div class="modal-info">
                    <h2 id="modal-title"></h2>
                    <div class="modal-meta">
                        <span class="rating" id="modal-rating"></span>
                        <span class="year" id="modal-year"></span>
                        <span class="duration" id="modal-duration"></span>
                        <span class="genre" id="modal-genre"></span>
                    </div>
                    <p class="modal-overview" id="modal-overview"></p>
                    <div class="modal-actions">
                        <button class="btn play-btn" id="modal-play-btn"><i class="fas fa-play"></i> Watch Now</button>
                        <button class="btn add-btn" id="modal-add-btn"><i class="fas fa-plus"></i> Add to My List</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Video Player Modal -->
    <div class="video-modal" id="video-modal">
        <div class="video-modal-content">
            <div class="video-header">
                <h2 class="video-title" id="video-title"></h2>
                <span class="close-video">&times;</span>
            </div>
            <div class="video-container" id="video-container">
                <!-- Video iframe will be inserted here -->
            </div>
            <div class="server-selector">
                <h3>Select Server:</h3>
                <div class="server-buttons">
                    <button class="server-btn active" data-server="vidsrc">Server 1 (VidSrc)</button>
                    <button class="server-btn" data-server="embed">Server 2 (Embed.su)</button>
                    <button class="server-btn" data-server="2embed">Server 3 (2Embed)</button>
                    <button class="server-btn" data-server="smashy">Server 4 (Smashy)</button>
                    <button class="server-btn" data-server="auto">Server 5 (Auto)</button>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
                </html>
